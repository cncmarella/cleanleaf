# Fly.io deployment for the CleanLeaf API.
# Secrets (RESEND_API_KEY) are NOT set here -- use `fly secrets set`.

app = "cleanleaf-api"
primary_region = "bom" # Mumbai: closest region to Hyderabad

[build]

[env]
  APP_ENV = "production"
  PORT = "8080"
  MAIL_TO = "cleanleaf789@gmail.com"
  # Update this the moment the frontend gets a custom domain.
  ALLOWED_ORIGINS = "https://cleanleaf.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero between enquiries. A cold start adds ~1s to the first
  # request, which is a fair trade for a contact form that is idle most days.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
